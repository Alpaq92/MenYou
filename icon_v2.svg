<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512" height="512">
    <defs>
        <!-- 1. Body: radial off-white → cool gray, focal point pulled toward the top
             so the upper half reads brighter, like a glass bead under top light. -->
        <radialGradient id="body" cx="50%" cy="35%" r="65%">
            <stop offset="0" stop-color="#fcfdff" />
            <stop offset="1" stop-color="#e4e8f0" />
        </radialGradient>

        <!-- 2. Upper glassy sheen: bright translucent white at top, fading mid-way. -->
        <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.92" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
        </linearGradient>

        <!-- 3. Lower darken band: implies weight, hints at the glass thickness. -->
        <linearGradient id="darken" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#001e3c" stop-opacity="0" />
            <stop offset="1" stop-color="#001e3c" stop-opacity="0.31" />
        </linearGradient>

        <!-- 4. Specular catchlight: sharp wet dot in the upper-left, the
             defining "Liquid Glass" highlight. -->
        <radialGradient id="spec" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#ffffff" stop-opacity="1" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>

        <!-- 5. Inner rim refraction: a dark band hugging the edge that simulates
             the glass curvature catching the background. -->
        <radialGradient id="rim" cx="50%" cy="50%" r="50%">
            <stop offset="0.86" stop-color="#1e325a" stop-opacity="0" />
            <stop offset="1" stop-color="#1e325a" stop-opacity="0.43" />
        </radialGradient>

        <!-- 6. Bottom bounce light: refracted ground-light glow at the lower rim. -->
        <radialGradient id="bounce" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.47" />
            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
        </radialGradient>

        <!-- Clip every gloss layer to the circle so nothing spills outside. -->
        <clipPath id="clip">
            <circle cx="256" cy="256" r="248" />
        </clipPath>
    </defs>

    <!-- Body fill. -->
    <circle cx="256" cy="256" r="248" fill="url(#body)" />

    <!-- Icon (4 blue tiles from icon.svg) sized to ~75% of the canvas,
         centered. iconScale = 512 * 0.75 / 24 = 16. Translate puts the
         24×24 origin at the centered offset. -->
    <g transform="translate(64 64) scale(16)" fill="#165BFF">
        <rect x="3"  y="3"  width="8" height="10" />
        <rect x="13" y="3"  width="8" height="6" />
        <rect x="13" y="11" width="8" height="10" />
        <rect x="3"  y="15" width="8" height="6" />
    </g>

    <!-- Gloss / glass effects clipped to the disc. -->
    <g clip-path="url(#clip)">
        <!-- Lower darken band. -->
        <rect x="8" y="281" width="496" height="223" fill="url(#darken)" />

        <!-- Upper sheen ellipse. -->
        <ellipse cx="256" cy="161" rx="213" ry="136" fill="url(#sheen)" />

        <!-- Specular catchlight, upper-left. -->
        <ellipse cx="194" cy="84"  rx="42"  ry="22" fill="url(#spec)" />

        <!-- Bottom bounce light. -->
        <ellipse cx="256" cy="430" rx="124" ry="37" fill="url(#bounce)" />

        <!-- Inner rim refraction. -->
        <circle cx="256" cy="256" r="248" fill="url(#rim)" />
    </g>

    <!-- Outer crisp silhouette. -->
    <circle cx="256" cy="256" r="248" fill="none"
            stroke="#000000" stroke-opacity="0.22" stroke-width="2" />
</svg>
