# Dependabot version updates for MenYou.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Conventional-commits prefixes are tuned for release-please:
#   - fix(deps):    → "Bug Fixes" / "Dependencies" section + patch bump
#   - chore(deps):  → hidden from CHANGELOG, no release
#
# NuGet bumps DO trigger releases because consumer-facing runtime deps
# (Avalonia, Fluid.Avalonia, CommunityToolkit.Mvvm) can carry behavior
# changes.
# GitHub Actions bumps are workflow-only and don't ship to users.
#
# Auto-merge for Dependabot PRs is handled by
# .github/workflows/dependabot-auto-merge.yml — they merge as soon as
# CI / CodeQL / Security pass, without the 7-day soak that applies to
# human-authored PRs.

version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - nuget
    commit-message:
      # `include: scope` already appends the (deps)/(deps-dev) scope, so the
      # prefix must be the bare type — otherwise you get `fix(deps)(deps):`,
      # which isn't valid conventional-commit syntax and breaks release-please.
      prefix: "fix"
      include: scope
    # Group minor + patch bumps into a single PR so the CI cost stays
    # bounded. Major bumps stay separate — they're more likely to
    # require manual investigation.
    groups:
      nuget-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      # Bare type — `include: scope` appends the (deps) scope (see above).
      prefix: "chore"
      include: scope
