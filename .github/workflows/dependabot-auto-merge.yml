# --------------------------------------------------------------------------
# dependabot-auto-merge.yml — immediate auto-merge for Dependabot PRs.
#
# Dependabot's own PRs are pre-trusted (we configured Dependabot, so we
# trust it to bump versions correctly). They skip the 7-day soak applied
# to human contributions in auto-merge.yml.
#
# `gh pr merge --auto --squash` enables GitHub's native auto-merge — the
# PR will merge as soon as required status checks pass and no
# CHANGES_REQUESTED reviews are open. Required checks are configured at
# the branch ruleset level (CI / CodeQL / Security), so this script doesn't
# need to know about them.
#
# Only NuGet bumps are auto-merged. GitHub Actions bumps (chore(deps):)
# are also routinely safe, but they're workflow-only and not user-facing,
# so we opt them in here too for parity.
# --------------------------------------------------------------------------
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for NuGet + Actions PRs
        # Both ecosystems we configured in dependabot.yml. If we ever add
        # docker / npm / etc. they'll skip this gate and fall through to
        # the 7-day auto-merge.yml — opt them in explicitly when adding.
        if: >
          steps.meta.outputs.package-ecosystem == 'nuget' ||
          steps.meta.outputs.package-ecosystem == 'github_actions'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          # PAT preferred so the squashed merge commit fires release-please
          # on main (GITHUB_TOKEN merges don't trigger downstream workflows).
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
