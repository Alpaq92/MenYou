# --------------------------------------------------------------------------
# monthly-maintenance.yml — monthly dependency refresh + release.
#
# On the 1st of every month it upgrades the project's NuGet packages to
# their latest MINOR/PATCH versions (majors are deliberately left out — a
# major bump like Avalonia 12 -> 13 should be a conscious, reviewed change),
# opens a `fix(deps): monthly dependency refresh` PR, and enables auto-merge
# on it. Once CI is green the PR squash-merges; the `fix(deps):` commit then
# drives release-please to open + auto-merge a release PR, cutting a fresh
# patch release. The net effect: a maintained, re-released build every month.
#
# NOTE: for this to run end-to-end unattended, set a `RELEASE_PLEASE_PAT`
# repository secret (a PAT with `repo` + `workflow` scope). A PR opened with
# the default GITHUB_TOKEN does NOT trigger the build/CodeQL/Security checks,
# so auto-merge would wait forever. With the PAT, the PR's CI runs, it
# merges, and the release flows automatically.
#
# TRANSLATIONS (Crowdin): this job also syncs translations. It PULLS
# completed translations from the Crowdin project into the same refresh PR
# (so they ship in that month's release), and at the END pushes the current
# en.json source strings back to Crowdin so newly added strings become
# translatable. Both steps self-skip when CROWDIN_PROJECT_ID /
# CROWDIN_PERSONAL_TOKEN aren't set, so the dependency bump still runs.
# --------------------------------------------------------------------------
name: Monthly maintenance

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: monthly-maintenance
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh dependencies and open release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Upgrade NuGet packages (minor/patch only)
        run: |
          dotnet tool install --global dotnet-outdated-tool
          export PATH="$PATH:$HOME/.dotnet/tools"
          # --version-lock Major keeps the major component fixed, so only
          # minor/patch upgrades are applied.
          dotnet outdated src/MenYou/MenYou.csproj --upgrade --version-lock Major

      - name: Detect Crowdin config
        id: crowdin
        shell: bash
        env:
          CROWDIN_PROJECT_ID:     ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          if [ -n "$CROWDIN_PROJECT_ID" ] && [ -n "$CROWDIN_PERSONAL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Crowdin secrets not set — skipping translation sync."
          fi

      - name: Install Crowdin CLI
        if: steps.crowdin.outputs.configured == 'true'
        run: npm install -g @crowdin/cli

      # Pull completed translations into the working tree so they're part of
      # the refresh PR below (and thus this month's release).
      - name: Pull translations from Crowdin
        if: steps.crowdin.outputs.configured == 'true'
        env:
          CROWDIN_PROJECT_ID:     ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: crowdin download --config crowdin.yml --no-progress

      - name: Open dependency-refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          # PAT preferred so the PR triggers CI and downstream release flow.
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "fix(deps): monthly dependency refresh"
          title: "fix(deps): monthly dependency refresh"
          body: |
            Automated monthly maintenance: a NuGet minor/patch refresh (major
            bumps are left to deliberate, reviewed upgrades) plus any completed
            translations pulled from Crowdin.

            Auto-merges once CI is green; release-please then cuts a patch
            release. If nothing changed this month, no PR is created.

            > Needs the `RELEASE_PLEASE_PAT` secret to run CI + merge + release
            > unattended (a GITHUB_TOKEN-created PR doesn't trigger workflows).
          branch: chore/monthly-deps
          base: main
          labels: |
            dependencies
            nuget
            i18n
          delete-branch: true

      - name: Enable auto-merge on the refresh PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR" --repo "$GITHUB_REPOSITORY"

      # Push current en.json source strings to Crowdin so newly added ones
      # become translatable. Idempotent — Crowdin only registers strings that
      # are actually new, so this is a no-op when en.json hasn't gained any.
      - name: Push source strings (en.json) to Crowdin
        if: steps.crowdin.outputs.configured == 'true'
        env:
          CROWDIN_PROJECT_ID:     ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: crowdin upload sources --config crowdin.yml --no-progress
