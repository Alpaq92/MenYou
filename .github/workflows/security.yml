# --------------------------------------------------------------------------
# security.yml — secrets, dependency, and filesystem scanning.
#
#   - gitleaks: scans the full git history for accidentally-committed
#     credentials. Runs on push + PR.
#   - dependency-review: PR-only. Fails the check on HIGH or CRITICAL
#     CVEs introduced by the PR's dependency changes (NuGet diff).
#   - trivy: filesystem scan for HIGH/CRITICAL vulns in third-party
#     code (catches transitive issues dependency-review missed).
# --------------------------------------------------------------------------
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    # PR-only — dependency-review-action diffs base..head NuGet manifests.
    # On push there's nothing to diff.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          # exit-code 0 — finding a HIGH vuln doesn't fail the check
          # (SARIF upload + Security-tab triage is the workflow). Set
          # to 1 once we're confident no false positives are surfacing.
          exit-code: "0"
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: trivy
